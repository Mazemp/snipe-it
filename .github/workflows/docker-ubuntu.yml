# Snipe-IT Docker image build for GitHub Container Registry (ghcr.io)
name: Docker images (Ubuntu)

# Run this Build for all pushes to 'master' or develop branch, or tagged releases.
# Also run for PRs to ensure PR doesn't break Docker build process.
# Use the Actions tab ("Run workflow") to build any other branch on demand.
on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v**'
  # Allows you to run this workflow manually from the Actions tab (any branch)
  workflow_dispatch:

  pull_request:

# GITHUB_TOKEN needs packages:write to push to ghcr.io
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # docker/metadata-action lowercases this automatically (Mazemp -> mazemp)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    # Only run for this fork. Never executes on upstream or other forks.
    if: github.repository == 'Mazemp/snipe-it'
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - name: Checkout codebase
        uses: actions/checkout@v6

      # https://github.com/docker/setup-buildx-action
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # https://github.com/docker/login-action
      - name: Log in to Container Registry
        # Only login if not a PR, as PRs only trigger a Docker build and not a push
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
          flavor: |
            latest=false

      # https://github.com/docker/build-push-action
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # For pull requests, build only (verify it doesn't break); push otherwise.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers across runs via the GitHub Actions cache to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
